name: KIS Price Snapshot

on:
  schedule:
    # KST 09:00~14:50, every 10 minutes
    - cron: "*/10 0-5 * * 1-5"
    # KST 15:00, 15:10, 15:20, 15:30
    - cron: "0,10,20,30 6 * * 1-5"
    # KST 10:05, 14:05 Telegram report
    - cron: "5 1,5 * * 1-5"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even outside Korean regular market hours"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      send_telegram:
        description: "Send Telegram report after snapshot"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: kis-price-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get KST date
        id: date
        run: echo "value=$(TZ='Asia/Seoul' date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore KIS token cache
        uses: actions/cache@v4
        with:
          path: kis_snapshot/.kis_token.json
          key: kis-token-${{ steps.date.outputs.value }}

      - name: Run KIS snapshot
        working-directory: kis_snapshot
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: https://openapi.koreainvestment.com:9443
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
          TICKERS_CSV_URL: ${{ secrets.TICKERS_CSV_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GENERATE_REPORT: "true"
          REPORT_PATH: latest_report.md
          REPORT_TYPE: intraday
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true' }}
          SEND_TELEGRAM_REPORT: ${{ (github.event_name == 'schedule' && github.event.schedule == '5 1,5 * * 1-5') || (github.event_name == 'workflow_dispatch' && github.event.inputs.send_telegram == 'true') }}
        run: python kis_price_snapshot.py

      - name: Commit latest snapshot and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kis_snapshot/latest_snapshot.csv kis_snapshot/latest_report.md kis_snapshot/snapshots kis_snapshot/reports
          git commit -m "Update latest KIS snapshot" || echo "No changes to commit"
          git push
