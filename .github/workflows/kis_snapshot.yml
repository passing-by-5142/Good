name: KIS Price Snapshot

on:
  schedule:
    - cron: "*/10 0-5 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get KST date
        id: date
        run: echo "value=$(TZ='Asia/Seoul' date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore KIS token cache
        uses: actions/cache@v4
        with:
          path: kis_snapshot/.kis_token.json
          key: kis-token-${{ steps.date.outputs.value }}

      - name: Run KIS snapshot
        working-directory: kis_snapshot
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: https://openapi.koreainvestment.com:9443
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          SNAPSHOT_TOKEN: ${{ secrets.SNAPSHOT_TOKEN }}
          TICKERS_CSV_URL: ${{ secrets.TICKERS_CSV_URL }}
          GENERATE_REPORT=true
          REPORT_PATH=kis_snapshot/latest_report.md
          REPORT_TYPE=intraday
        run: python kis_price_snapshot.py

      - name: Commit latest snapshot CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kis_snapshot/latest_snapshot.csv
          git commit -m "Update latest KIS snapshot" || echo "No changes to commit"
          git push
